# Nightly live eval + judge run.
#
# Requires a repo secret AWS_BEDROCK_EVAL_ROLE_ARN: an IAM role with
# bedrock:InvokeModel* permission on the Claude inference profile used by
# src/config/models.ts, trusted for GitHub OIDC from this repo.
#
# This workflow refreshes recordings and judgments and uploads them as a
# build artifact — it does NOT commit the results back to the repo.
# Promoting a new baseline (updating evals/recordings/ and
# evals/judgments/) is a deliberate human PR after reviewing the artifact.
name: Evals Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  live-eval-and-judge:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Provide Amplify outputs stub
        run: cp amplify_outputs.ci.json amplify_outputs.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_EVAL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Refresh live recordings
        run: bun run eval:live

      - name: Run LLM-as-judge over fresh recordings
        run: bun run eval:judge

      - name: Deterministic gate against fresh recordings
        run: bun run eval

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            evals/recordings/
            evals/judgments/
